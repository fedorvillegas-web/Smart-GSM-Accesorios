<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart GSM</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

/* HEADER */
header {
    background: black;
    padding: 15px;
    text-align: center;
    font-size: 26px;
    font-weight: bold;
}

/* BANNER */
.banner {
    background: linear-gradient(90deg, #0ea5e9, #22c55e);
    padding: 20px;
    text-align: center;
    font-size: 18px;
    font-weight: bold;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    padding: 20px;
}

/* CARD */
.card {
    background: #1e293b;
    border-radius: 16px;
    padding: 15px;
    text-align: center;
    position: relative;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-6px);
}

/* ETIQUETA */
.tag {
    position: absolute;
    top: 10px;
    left: 10px;
    background: red;
    padding: 5px 10px;
    border-radius: 8px;
    font-size: 12px;
}

/* IMG */
.card img {
    width: 100%;
    height: 160px;
    object-fit: contain;
}

/* TEXTOS */
.nombre {
    font-weight: bold;
    margin: 10px 0;
}

.precio {
    color: #22c55e;
    font-size: 20px;
    font-weight: bold;
}

/* BOTON */
.btn {
    background: #25D366;
    padding: 10px;
    border-radius: 10px;
    color: white;
    text-decoration: none;
    display: block;
    margin-top: 10px;
    font-weight: bold;
}

.btn:hover {
    background: #1ebe5d;
}

/* WHATSAPP FLOAT */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    padding: 15px;
    border-radius: 50%;
    font-size: 22px;
    text-decoration: none;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 15px;
    color: gray;
}
</style>
</head>
