<title>Smart GSM</title>

<style>
body {
margin:0;
font-family:'Segoe UI',Arial;
background: linear-gradient(135deg, #dbeafe, #eef2ff, #f8fafc);
background-size: 300% 300%;
animation: fondoAnimado 12s ease infinite;
}

@keyframes fondoAnimado {
0% {background-position: 0% 50%;}
50% {background-position: 100% 50%;}
100% {background-position: 0% 50%;}
}

header {
background: linear-gradient(135deg,#0f172a,#1e293b);
color:white;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.25);
position:sticky;
top:0;
z-index:100;
}

.topbar {display:flex;justify-content:space-between;align-items:center;}

input {
padding:10px 15px;
border-radius:25px;
border:none;
width:230px;
outline:none;
box-shadow:0 3px 10px rgba(0,0,0,0.15);
transition:0.3s;
}

input:focus {
transform:scale(1.05);
}

#filtros {display:flex;gap:8px;flex-wrap:wrap;}

#filtros button {
background:white;
border:1px solid #d1d5db;
padding:8px 14px;
border-radius:20px;
cursor:pointer;
font-size:13px;
font-weight:500;
transition:all 0.25s ease;
}

#filtros button:hover {
background:#000;
color:white;
border-color:#000;
transform:scale(1.05);
}

#filtros button.activo {
background:#000;
color:white;
border-color:#000;
}

.container {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;padding:20px;
}

.card {
background: rgba(255,255,255,0.75);
backdrop-filter: blur(10px);
border-radius:20px;
padding:15px;
text-align:center;
box-shadow:0 8px 25px rgba(0,0,0,0.1);
position:relative;
transition: transform 0.3s ease, box-shadow 0.3s ease;
border:1px solid rgba(255,255,255,0.3);
}

.card:hover {
transform: scale(1.05);
box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.card.agotado {filter: grayscale(100%) brightness(0.85);}

.badge {
position:absolute;top:10px;left:10px;
background:#dc3545;color:white;
padding:4px 8px;border-radius:6px;font-size:12px;
}

.card img {
width:100%;
height:160px;
object-fit:contain;
transition: transform 0.3s ease;
}

.card:hover img {transform: scale(1.1);}

.price {
font-weight:bold;
margin:10px 0;
font-size:20px;
color:#16a34a;
}

.btn {
background:#111827;
color:white;
border:none;
padding:10px;
border-radius:12px;
width:100%;
cursor:pointer;
margin-top:5px;
transition:0.3s;
}

.btn:hover {
transform:scale(1.05);
}

.buy {
background: linear-gradient(135deg,#25D366,#128C7E);
font-weight:bold;
}

#abrirCarrito {
position:fixed;
bottom:20px;
right:20px;
background: linear-gradient(135deg,#000,#374151);
color:white;
border:none;
padding:18px;
border-radius:50%;
font-size:22px;
z-index:999;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
transition:0.3s;
}

#abrirCarrito:hover {
transform:scale(1.1);
}

#contador {
position:absolute;top:-5px;right:-5px;
background:red;color:white;font-size:12px;
padding:3px 6px;border-radius:50%;
}

.panel {
position:fixed;
right:0;
top:0;
width:350px;
height:100%;
background:white;
box-shadow:-5px 0 20px rgba(0,0,0,0.2);
padding:15px;
transform:translateX(100%);
transition:0.3s;
display:flex;
flex-direction:column;
z-index:1000;

/* 👇 CLAVE */
overflow-y:auto;
}
.panel.activo {transform:translateX(0);}

#overlay {
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.4);display:none;
z-index:999;
}
#overlay.activo {display:block;}

.item {
display:flex;justify-content:space-between;
align-items:center;background:#f9fafb;
padding:8px;border-radius:10px;margin:8px 0;
}

.controls button {
background:#e5e7eb;border:none;
padding:4px 8px;border-radius:6px;
cursor:pointer;
}

.footer-carrito {margin-top:auto;padding-top:10px;}

.total {font-size:20px;font-weight:bold;margin-bottom:10px;}

.btn2 {
width:100%;padding:12px;border:none;
border-radius:10px;margin-top:5px;
cursor:pointer;font-size:14px;
}

.whatsapp {background:#25D366;color:white;}
.vaciar {background:#dc3545;color:white;}
.ver {background:#0d6efd;color:white;}

/* efecto click */

function mostrar(lista){
let html="";
lista.forEach(p=>{
if(ocultarAgotados && p[2]) return;

let img = p[3] ? p[3] : "img/default.png";

html+=`
<div class="card ${p[2] ? 'agotado' : ''}">
${p[2]?'<div class="badge">❌ AGOTADO</div>':''}
<img src="${img}">
<p>${p[0]}</p>
<p class="price">Bs ${p[1].toLocaleString()}</p>

${p[2] ? `
<button class="btn" disabled>Sin stock</button>
<button class="btn buy" disabled>No disponible</button>
` : `
<button class="btn" onclick="add('${p[0]}',${p[1]})">Agregar</button>
<button class="btn buy" onclick="comprar('${p[0]}',${p[1]})">💬 Comprar por WhatsApp</button>
`}
</div>`;
});
document.getElementById("productos").innerHTML=html;
}

function toggleAgotados(btn){
ocultarAgotados=!ocultarAgotados;
btn.textContent = ocultarAgotados ? "Mostrar agotados" : "Ocultar agotados";
mostrar(productos);
}

function renderVendedores(){
let html="<strong>📲 Elegir vendedor:</strong>";

vendedores.forEach(v=>{
html += `
<button class="btn2 whatsapp" onclick="enviar('${v.numero}','${v.nombre}')">
📲 ${v.nombre}
</button>
`;
});

document.getElementById("whatsappVendedores").innerHTML = html;
}

function enviar(numero,nombre){
let txt="🛒 *SMART GSM*%0A%0A";
let total=0;

txt += "Hola " + nombre + ", quiero realizar el siguiente pedido:%0A%0A";

for(let i in cart){
let p=cart[i];
txt+=`📱 ${i} x${p.cantidad}%0A`;
total+=p.precio*p.cantidad;
}

txt+=`%0ATotal: Bs ${total}`;

window.open("https://wa.me/"+numero+"?text="+txt);
}

function add(n,p){
if(!cart[n]) cart[n]={precio:p,cantidad:1};
else cart[n].cantidad++;
render();
}

function comprar(n,p){

if(!cart[n]) cart[n]={precio:p,cantidad:1};
else cart[n].cantidad++;

render();

document.getElementById("panel").classList.add("activo");
document.getElementById("overlay").classList.add("activo");

}

function render(){
let html="",total=0,cant=0;

for(let i in cart){
let p=cart[i];
let sub=p.precio*p.cantidad;
total+=sub;
cant+=p.cantidad;

html+=`
<div class="item">
<div>${i}</div>
<div class="controls">
<button onclick="cambiar('${i}',-1)">-</button>
${p.cantidad}
<button onclick="cambiar('${i}',1)">+</button>
</div>
<div>Bs ${sub.toLocaleString()}</div>
</div>`;
}

document.getElementById("lista").innerHTML=html;
document.getElementById("total").innerText=total.toLocaleString();
document.getElementById("contador").innerText=cant;
}

function cambiar(n,v){
cart[n].cantidad+=v;
if(cart[n].cantidad<=0) delete cart[n];
render();
}

function vaciar(){cart={};render();}

function togglePanel(){
document.getElementById("panel").classList.toggle("activo");
document.getElementById("overlay").classList.toggle("activo");
}

function cerrarPanel(){
document.getElementById("panel").classList.remove("activo");
document.getElementById("overlay").classList.remove("activo");
}

function verPedido(){
let txt="🧾 RESUMEN%0A%0A";
let total=0;

for(let i in cart){
let p=cart[i];
txt+=`${i} x${p.cantidad} = Bs ${p.precio*p.cantidad}%0A`;
total+=p.precio*p.cantidad;
}

txt+=`%0ATotal: Bs ${total}`;
alert(decodeURIComponent(txt));
}

document.getElementById("buscador").addEventListener("input",e=>{
let val=e.target.value.toLowerCase();
let filtrado=productos.filter(p=>p[0].toLowerCase().includes(val));
mostrar(filtrado);
});

function filtrar(marca){
if(!marca){mostrar(productos);return;}
let filtrado=productos.filter(p=>p[0].toLowerCase().includes(marca));
mostrar(filtrado);
}

mostrar(productos);
renderVendedores();
</script>
